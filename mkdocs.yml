site_name: PawnPro Debugger
site_description: Debugger visual (DAP) para Pawn (SA-MP / open.mp)
site_author: NullSablex
site_url: https://pawnpro-debugger.nullsablex.com/

repo_name: NullSablex/PawnPro-Debugger
repo_url: https://github.com/NullSablex/PawnPro-Debugger
edit_uri: edit/master/docs/

docs_dir: docs

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-night
        name: Tema escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Tema claro
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Link permanente
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Início: index.md
  - Uso:
      - Começando: getting-started.md
      - Recursos: features.md
  - Interno:
      - Arquitetura: architecture.md
      - Como funciona a pausa no erro: runtime-errors.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NullSablex/PawnPro-Debugger
